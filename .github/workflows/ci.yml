name: Cloud CI Pipeline

   # 1. The Trigger: When does this pipeline run?
   on:
     push:
       branches: [ "main" ]

   # 2. The Jobs: What is the robot actually doing?
   jobs:
     build-and-test:
       # We tell GitHub to spin up a fresh Ubuntu Linux server
       runs-on: ubuntu-latest

       steps:
       # Step 1: Download our code onto the Ubuntu server
       - name: Checkout code
         uses: actions/checkout@v3

       # Step 2: Install Python on the server
       - name: Set up Python
         uses: actions/setup-python@v4
         with:
           python-version: '3.10'

       # Step 3: Run the application
       - name: Run App
         run: python app.py

       # Step 4: Run the test script
       - name: Run Tests
         run: python test_app.py